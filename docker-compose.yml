# Backend Hackathon QIA - Serfinanza
#
# Levineantar:
#   docker compose up --build -d
#
# API expuesta en http://localhost:8090 (8080 interno)

services:
  hackathon-qia-backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: hackathon-qia-backend:latest
    container_name: hackathon-qia-backend
    ports:
      - "8090:8080"
    env_file:
      - .env.docker
    environment:
      - PORT=8080
      - ENV_FILE=.env.docker
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - banco-agent

networks:
  banco-agent:
    external: true
    name: banco-agent-net